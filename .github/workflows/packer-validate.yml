name: packer-validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  packer:
    name: Packer validate (${{ matrix.template }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template:
          - nexus-gateway
          - deb13        # Phase 0.B.2
          - ubuntu24     # Phase 0.B.3
          - ws2025-core    # Phase 0.B.4
          - ws2025-desktop # Phase 0.B.5
          - win11ent       # Phase 0.B.6
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-packer@v3
        with:
          version: "1.11.2"

      - name: packer init
        working-directory: packer/${{ matrix.template }}
        run: packer init .

      - name: packer fmt -check
        working-directory: packer/${{ matrix.template }}
        run: packer fmt -check -recursive .

      - name: packer validate
        working-directory: packer/${{ matrix.template }}
        # -syntax-only skips credential / network probe — CI has no VMware host
        run: packer validate -syntax-only .

  terraform:
    name: Terraform fmt + validate (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - gateway
          - deb13-smoke
          - ubuntu24-smoke
          - ws2025-core-smoke
          - ws2025-desktop-smoke
          - win11ent-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: terraform fmt -check (repo-wide, once per matrix leg)
        run: terraform -chdir=terraform fmt -check -recursive
      - name: terraform init (no backend)
        run: terraform -chdir=terraform/${{ matrix.env }} init -backend=false
      - name: terraform validate
        run: terraform -chdir=terraform/${{ matrix.env }} validate

  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-lint ansible
      - run: ansible-lint packer/nexus-gateway/ansible/ packer/deb13/ansible/ packer/ubuntu24/ansible/ packer/_shared/ansible/

  shell-lint:
    name: ShellCheck + PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning
          ignore_names: '*.ps1'
      - name: PSScriptAnalyzer (Windows PowerShell provisioners + scripts)
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $targets = @(
            'packer/_shared/powershell/scripts',
            'packer/ws2025-desktop/scripts',
            'packer/win11ent/scripts',
            'scripts'
          ) | Where-Object { Test-Path $_ }
          $issues = foreach ($t in $targets) {
            Invoke-ScriptAnalyzer -Path $t -Recurse -Severity Warning,Error `
              -ExcludeRule PSAvoidUsingWriteHost,PSUseShouldProcessForStateChangingFunctions
          }
          if ($issues) {
            $issues | Format-Table -AutoSize | Out-String | Write-Host
            $errors = $issues | Where-Object Severity -eq 'Error'
            if ($errors) { throw "PSScriptAnalyzer: $($errors.Count) error(s)" }
          } else {
            Write-Host "PSScriptAnalyzer: clean"
          }

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits on PRs
      - name: gitleaks detect
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

  product-key-guard:
    name: product-key pattern guard (pwsh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan every tracked file
        shell: pwsh
        run: |
          $tracked = git ls-files
          & ./scripts/check-no-product-key.ps1 -Paths $tracked
