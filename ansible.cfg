# Repo-root ansible.cfg — only purpose is to give ansible-lint a roles_path
# that can resolve the shared roles under packer/_shared/ansible/roles/ when
# it syntax-checks each template's playbook.yml.
#
# ansible-lint (invoked from repo root in CI) reads ./ansible.cfg; each
# template's local roles/ dir is auto-discovered relative to its playbook,
# so we only need the shared-roles path here.
#
# At Packer build time this file is irrelevant — ansible-local uploads each
# role listed in role_paths into a single directory on the target.
[defaults]
roles_path = packer/_shared/ansible/roles
