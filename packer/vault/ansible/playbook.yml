---
# vault — Ansible playbook (local, run by Packer ansible-local provisioner)
#
# Same shape as deb13's playbook.yml -- four shared nexus_* roles run first,
# then the vault_node role installs Vault, the systemd unit, the firstboot
# service, and the base config template. Order: nexus_identity (sshd hardening
# baseline) before nexus_network (NIC rename) before nexus_firewall (rules
# need nic0/nic1 to exist) before nexus_observability (node_exporter binding
# uses the renamed NIC). vault_node runs last -- it can assume sshd is up,
# nftables is configured, time is sync'd.

- name: Configure vault cluster node template
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    target_user: "{{ target_user | default('nexusadmin') }}"
    vault_version: "{{ vault_version | default('1.18.4') }}"
    vault_arch: "{{ vault_arch | default('linux_amd64') }}"

  roles:
    - nexus_identity
    - nexus_network
    - nexus_firewall
    - nexus_observability
    - vault_node
