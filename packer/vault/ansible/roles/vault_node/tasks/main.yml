---
# vault_node role — install Vault binary, systemd units, firstboot script,
# and base configuration template (rendered to vault.hcl at first boot).
#
# Runs after the four nexus_* shared roles (nexus_identity, nexus_network,
# nexus_firewall, nexus_observability) inside the vault Packer template.

- name: Create vault group
  ansible.builtin.group:
    name: "{{ vault_group }}"
    system: true
    state: present

- name: Create vault user
  ansible.builtin.user:
    name: "{{ vault_user }}"
    group: "{{ vault_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: /opt/vault
    create_home: false
    state: present

- name: Create Vault directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /opt/vault,                owner: "{{ vault_user }}", group: "{{ vault_group }}", mode: '0750' }
    - { path: "{{ vault_data_dir }}",    owner: "{{ vault_user }}", group: "{{ vault_group }}", mode: '0700' }
    - { path: "{{ vault_config_dir }}",  owner: root,               group: "{{ vault_group }}", mode: '0750' }
    - { path: "{{ vault_tls_dir }}",     owner: "{{ vault_user }}", group: "{{ vault_group }}", mode: '0750' }

- name: Download + verify + install Vault binary
  ansible.builtin.shell: |
    set -euo pipefail
    cd /tmp
    curl -fsSL "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_{{ vault_arch }}.zip" -o vault.zip
    curl -fsSL "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_SHA256SUMS" -o vault.SHA256SUMS
    grep "vault_{{ vault_version }}_{{ vault_arch }}.zip" vault.SHA256SUMS | sha256sum -c -
    unzip -o vault.zip
    install -m 755 -o root -g root vault /usr/local/bin/vault
    rm -f vault.zip vault.SHA256SUMS vault
  args:
    creates: /usr/local/bin/vault

- name: Set IPC_LOCK capability on Vault binary (allows mlock without root)
  community.general.capabilities:
    path: /usr/local/bin/vault
    capability: cap_ipc_lock=+ep
    state: present
  # community.general may not be installed; fall back to setcap if module missing.
  # The shell fallback below ensures the cap is set either way.
  ignore_errors: true

- name: Set IPC_LOCK capability on Vault binary (shell fallback)
  ansible.builtin.shell: setcap cap_ipc_lock=+ep /usr/local/bin/vault
  changed_when: false

- name: Install vault.hcl template (rendered to vault.hcl by firstboot script)
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: "{{ vault_config_dir }}/vault.hcl.tpl"
    owner: root
    group: "{{ vault_group }}"
    mode: '0640'

- name: Install vault.service systemd unit
  ansible.builtin.template:
    src: vault.service.j2
    dest: /etc/systemd/system/vault.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Install vault-firstboot.sh
  ansible.builtin.copy:
    src: vault-firstboot.sh
    dest: /usr/local/sbin/vault-firstboot.sh
    owner: root
    group: root
    mode: '0755'

- name: Install vault-firstboot.service systemd unit
  ansible.builtin.template:
    src: vault-firstboot.service.j2
    dest: /etc/systemd/system/vault-firstboot.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Enable vault-firstboot service (runs once on first clone boot)
  ansible.builtin.systemd:
    name: vault-firstboot.service
    enabled: true
    daemon_reload: true

- name: Enable vault service (will start after firstboot completes)
  ansible.builtin.systemd:
    name: vault.service
    enabled: true
    daemon_reload: true

- name: Verify Vault binary version
  ansible.builtin.command: /usr/local/bin/vault version
  changed_when: false
  register: vault_version_out

- name: Show Vault version
  ansible.builtin.debug:
    msg: "Installed Vault: {{ vault_version_out.stdout }}"
