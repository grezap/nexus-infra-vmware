#!/usr/sbin/nft -f
#
# vault — nftables ruleset
#
# Role: deny-all-inbound, allow management (SSH) + observability + Vault
# client API (8200) + Vault cluster RPC (8201) traffic from the appropriate
# subnets:
#
#   - Management (SSH/22, node_exporter/9100): VMnet11 lab subnet
#     192.168.70.0/24 (build host can reach via the gateway's NAT path;
#     other lab VMs co-located on VMnet11). Build-host reachability per
#     memory/feedback_lab_host_reachability.md.
#   - Vault client API (8200/tcp): VMnet11 service network (clients on
#     192.168.70.0/24 -- jumpbox, future apps, build-host operator).
#   - Vault cluster RPC (8201/tcp): VMnet10 backplane only (192.168.10.0/24
#     -- raft peers vault-1/2/3 talk on this NIC).
#
# At clone time the primary NIC is renamed to `nic0` by
# /etc/systemd/network/10-nic0.link (matching all en*); the secondary NIC
# is named by the OS (typically `enp0s4` or similar). The vault-firstboot
# service writes a /etc/systemd/network/20-nic1.link drop-in renaming the
# secondary to `nic1` based on its MAC, so the rules below can match
# stable interface names.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        iif "lo" accept
        ct state { established, related } accept
        ct state invalid drop

        # ICMP -- debug-friendly in lab
        ip protocol icmp   accept
        ip6 nexthdr icmpv6 accept

        # Management on VMnet11 (primary NIC = nic0)
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 22   accept comment "SSH from VMnet11"
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 9100 accept comment "node_exporter from VMnet11"

        # Vault client API on VMnet11 (primary NIC = nic0)
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 8200 accept comment "Vault API from VMnet11"

        # Vault cluster RPC on VMnet10 backplane (secondary NIC = nic1)
        iifname "nic1" ip saddr 192.168.10.0/24 tcp dport 8200 accept comment "Vault API peer from VMnet10"
        iifname "nic1" ip saddr 192.168.10.0/24 tcp dport 8201 accept comment "Vault Raft RPC from VMnet10"

        counter drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
