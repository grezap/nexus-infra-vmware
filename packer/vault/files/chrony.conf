# vault — chrony client config
# Same as deb13's chrony.conf -- NexusPlatform time source is nexus-gateway
# (192.168.70.1) on VMnet11. Vault doesn't impose any extra time-sync
# requirements at lab scale; the cluster's leader-election + token TTL
# math is well within standard NTP accuracy.

server 192.168.70.1 iburst prefer
pool   2.debian.pool.ntp.org iburst

driftfile /var/lib/chrony/chrony.drift
ntsdumpdir /var/lib/chrony

makestep 1.0 3
rtcsync

# Client-only -- do not serve NTP to anyone
deny all

logdir /var/log/chrony
