---
# nexus_gateway — role tasks
#
# Delivers:
#   - Persistent NIC naming via systemd-networkd (nic0/nic1/nic2)
#   - IP forwarding (sysctl)
#   - nftables ruleset (from /tmp/nftables.conf, staged by Packer)
#   - dnsmasq config
#   - chrony config
#   - node_exporter for Prometheus scraping
#   - Unattended security updates
#   - SSH hardening (key-only post-build; build-time password kept until Phase 0.D)

- name: Ensure required packages are present
  ansible.builtin.apt:
    name:
      - nftables
      - dnsmasq
      - chrony
      - systemd-resolved
      - prometheus-node-exporter
      - unattended-upgrades
      - apt-listchanges
      - curl
      - ca-certificates
      - tcpdump
      - iptraf-ng
      - mtr-tiny
    state: present
    update_cache: true

# ─── Persistent NIC naming ──────────────────────────────────────────────
# The three NICs attach in MAC order at boot. We map by MAC — Terraform
# assigns deterministic MACs so the Link= match stays stable across boots.
# For the Packer build itself there's only one NIC (nat); Terraform lays down
# the other two matching .link files at instantiation time. We ship a
# minimal set here; Terraform overwrites with actual MACs.

- name: Deploy systemd .link files (renames ensXX → nic0/1/2 by MAC address)
  # Historical bug: we previously matched by Path=pci-0000:02:01.0/02/03 but
  # VMware Workstation's clone-then-add-NIC flow assigns pciSlotNumber values
  # (160/192/224 → different Path= strings) that don't line up with the
  # Packer-build-time single-NIC layout. Matching by MAC is bulletproof
  # because Terraform pins the MACs in the .vmx before first boot. Defaults
  # below mirror terraform/gateway/variables.tf — override via
  # `packer build -var 'mac_nic0=...'` if you change them on the Terraform
  # side and want the template to stay in sync.
  ansible.builtin.copy:
    dest: "/etc/systemd/network/{{ item.file }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      [Match]
      MACAddress={{ item.mac | lower }}

      [Link]
      Name={{ item.name }}
  loop:
    - { file: "10-nic0.link", mac: "{{ mac_nic0 | default('00:50:56:3F:00:10') }}", name: "nic0" }
    - { file: "11-nic1.link", mac: "{{ mac_nic1 | default('00:50:56:3F:00:11') }}", name: "nic1" }
    - { file: "12-nic2.link", mac: "{{ mac_nic2 | default('00:50:56:3F:00:12') }}", name: "nic2" }

- name: Deploy systemd-networkd .network files (static IPs on nic1 + nic2)
  ansible.builtin.copy:
    dest: "/etc/systemd/network/{{ item.file }}"
    owner: root
    group: root
    mode: "0644"
    content: "{{ item.content }}"
  loop:
    - file: "20-nic0.network"
      content: |
        [Match]
        Name=nic0

        [Network]
        DHCP=yes
    - file: "21-nic1.network"
      content: |
        [Match]
        Name=nic1

        [Network]
        Address=192.168.70.1/24
        IPForward=yes
    - file: "22-nic2.network"
      content: |
        [Match]
        Name=nic2

        [Network]
        Address=192.168.10.1/24
        IPForward=no

- name: Switch DNS resolver ownership from NetworkManager/resolvconf → systemd-networkd
  ansible.builtin.systemd:
    name: systemd-networkd
    enabled: true
    masked: false

# ─── IP forwarding ───────────────────────────────────────────────────────
- name: Enable IPv4 forwarding (sysctl)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    sysctl_file: /etc/sysctl.d/10-nexus-gateway.conf
    reload: true

- name: Ensure nf_conntrack module loads at boot (required for nf_conntrack_max sysctl)
  ansible.builtin.copy:
    dest: /etc/modules-load.d/nexus-gateway.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Loaded early so /proc/sys/net/netfilter/nf_conntrack_max exists before
      # 10-nexus-gateway.conf is applied by systemd-sysctl at boot.
      nf_conntrack

- name: Load nf_conntrack now so the subsequent sysctl task can write its tunable
  community.general.modprobe:
    name: nf_conntrack
    state: present

- name: Tune net.core.somaxconn + tcp_max_syn_backlog + nf_conntrack_max for a small-NAT box
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/10-nexus-gateway.conf
    reload: true
  loop:
    - { name: "net.core.somaxconn", value: "4096" }
    - { name: "net.ipv4.tcp_max_syn_backlog", value: "4096" }
    - { name: "net.netfilter.nf_conntrack_max", value: "131072" }

# ─── nftables ────────────────────────────────────────────────────────────
- name: Install nftables ruleset (staged by Packer at /tmp/nftables.conf)
  ansible.builtin.copy:
    src: /tmp/nftables.conf
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Validate nftables ruleset
  ansible.builtin.command: nft -c -f /etc/nftables.conf
  changed_when: false

- name: Enable + start nftables
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

# ─── dnsmasq ─────────────────────────────────────────────────────────────
- name: Install dnsmasq config
  ansible.builtin.copy:
    src: /tmp/dnsmasq.conf
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: "0644"
    remote_src: true
  notify: Restart dnsmasq

- name: Ensure /etc/dnsmasq.d exists
  ansible.builtin.file:
    path: /etc/dnsmasq.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Seed empty addn-hosts (populated by Terraform + nexus-cli over time)
  ansible.builtin.copy:
    dest: /etc/dnsmasq.d/hosts.nexus
    content: |
      # Static host entries — managed by nexus-cli; do not hand-edit.
      # 192.168.70.10  dc-nexus.nexus.local   dc-nexus
      # ...
    owner: root
    group: root
    mode: "0644"
    force: false  # do not clobber after first boot

- name: Disable systemd-resolved stub so dnsmasq can bind :53
  ansible.builtin.systemd:
    name: systemd-resolved
    enabled: false
    state: stopped

- name: Replace /etc/resolv.conf with self-loopback (dnsmasq)
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      nameserver 127.0.0.1
      search nexus.local

- name: Enable dnsmasq (do NOT start — interfaces nic1/nic2 don't exist until first boot)
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: stopped

# ─── chrony ──────────────────────────────────────────────────────────────
- name: Install chrony config
  ansible.builtin.copy:
    src: /tmp/chrony.conf
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
    remote_src: true
  notify: Restart chrony

- name: Enable + start chrony
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started

# ─── node_exporter ───────────────────────────────────────────────────────
- name: Enable + start prometheus-node-exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    enabled: true
    state: started

# ─── Unattended security updates ─────────────────────────────────────────
- name: Configure unattended-upgrades (security only)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50nexus-unattended
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Origins-Pattern {
          "origin=Debian,codename=${distro_codename},label=Debian-Security";
      };
      Unattended-Upgrade::Automatic-Reboot "false";
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

# ─── Owner public key (optional) ─────────────────────────────────────────
# If packer/nexus-gateway/ansible/roles/nexus_gateway/files/nexusadmin.pub
# exists at build time, deploy it to authorized_keys so the owner can SSH
# in from day one. Absent file is not an error — Phase 0.D Vault-managed
# SSH CA takes over later.
- name: Check for owner's SSH public key (optional)
  ansible.builtin.stat:
    path: "{{ role_path }}/files/nexusadmin.pub"
  register: nexus_gateway_nexusadmin_pub

- name: Ensure ~/.ssh exists for {{ target_user }}
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.ssh"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0700"
  when: nexus_gateway_nexusadmin_pub.stat.exists

- name: Install owner's public key into authorized_keys
  ansible.posix.authorized_key:
    user: "{{ target_user }}"
    key: "{{ lookup('ansible.builtin.file', role_path + '/files/nexusadmin.pub') }}"
    state: present
    exclusive: false
  when: nexus_gateway_nexusadmin_pub.stat.exists

# ─── SSH hardening ───────────────────────────────────────────────────────
# Keep password auth enabled during Packer build (so Packer can log in).
# Phase 0.D's Terraform/Ansible run swaps to key-only + disables password.
- name: Harden SSH (server-side minimums)
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config.d/10-nexus-hardening.conf
    create: true
    owner: root
    group: root
    mode: "0644"
    block: |
      PermitRootLogin no
      X11Forwarding no
      AllowAgentForwarding no
      MaxAuthTries 3
      LoginGraceTime 20
      ClientAliveInterval 60
      ClientAliveCountMax 3
  notify: Restart ssh

# ─── Banner ──────────────────────────────────────────────────────────────
- name: Install MOTD
  ansible.builtin.copy:
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"
    content: |
      ╔═══════════════════════════════════════════════════════════════╗
      ║  nexus-gateway — NexusPlatform lab edge router (VM #0)        ║
      ║  VMnet11 gateway: 192.168.70.1   VMnet10: 192.168.10.1        ║
      ║  Services: nftables · dnsmasq · chrony · node_exporter        ║
      ║  Upstream DNS: 1.1.1.1 · 9.9.9.9                              ║
      ║  Built from nexus-infra-vmware/packer/nexus-gateway           ║
      ╚═══════════════════════════════════════════════════════════════╝
