# nexus-gateway — chrony
# Source time from public NTP pools; serve time to the lab on VMnet11 only.

# Upstream sources
pool 2.debian.pool.ntp.org iburst
pool time.cloudflare.com   iburst

# Record the rate at which the system clock gains/losses time
driftfile /var/lib/chrony/chrony.drift

# Save NTS keys across reboots
ntsdumpdir /var/lib/chrony

# Allow lab VMs on VMnet11 (and VMnet10 for completeness) to query time
allow 192.168.70.0/24
allow 192.168.10.0/24

# Never act as a server to the internet
deny 0.0.0.0/0

# Serve time even when unsynchronised (lab cold-boot tolerance)
local stratum 10

# Step the system clock if >1s off; only during first 3 updates
makestep 1.0 3

# Enable kernel synchronization of hardware clock
rtcsync

# Log measurements / tracking / statistics
logdir /var/log/chrony
log tracking measurements statistics

# Hardware timestamping where supported (VMware doesn't expose, so harmless)
hwtimestamp *
