#!/usr/sbin/nft -f
#
# nexus-gateway — nftables ruleset
# Role: masquerade VMnet11 (192.168.70.0/24) through NIC0 (bridged to physical LAN).
# Drop VMnet10 (192.168.10.0/24) egress attempts — backplane is isolated.
#
# Interface naming (set by systemd-networkd via /etc/systemd/network/*.network):
#   nic0  — bridged (physical LAN, internet)
#   nic1  — vmnet11 (192.168.70.1/24, lab gateway)
#   nic2  — vmnet10 (192.168.10.1/24, backplane)

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback + established
        iif "lo" accept
        ct state { established, related } accept
        ct state invalid drop

        # ICMP
        ip protocol icmp  accept
        ip6 nexthdr icmpv6 accept

        # SSH from VMnet11 only (management plane)
        iifname "nic1" tcp dport 22  accept comment "SSH from VMnet11"

        # DNS + DHCP from VMnet11 (dnsmasq)
        iifname "nic1" udp dport 53  accept comment "DNS from lab"
        iifname "nic1" tcp dport 53  accept
        iifname "nic1" udp dport 67  accept comment "DHCP from lab"

        # NTP from VMnet11 (chrony)
        iifname "nic1" udp dport 123 accept comment "NTP from lab"

        # Prometheus node_exporter from VMnet11 only
        iifname "nic1" tcp dport 9100 accept comment "node_exporter"

        # Backplane visibility: accept ICMP only (host-only network, no app traffic)
        iifname "nic2" ip protocol icmp accept

        # Drop everything else
        counter drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        # Established/related return traffic
        ct state { established, related } accept

        # Lab (VMnet11) → internet (bridged NIC0)
        iifname "nic1" oifname "nic0" accept

        # Explicitly DROP VMnet10 → anywhere (backplane isolation)
        iifname "nic2" drop

        # No VMnet11 ↔ VMnet10 crossing via this host — lab VMs talk to each other
        # directly on both vnets; this gateway does not bridge them.
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {
    chain prerouting {
        type nat hook prerouting priority -100;
    }
    chain postrouting {
        type nat hook postrouting priority 100; policy accept;

        # Masquerade lab → internet
        oifname "nic0" ip saddr 192.168.70.0/24 masquerade
    }
}
