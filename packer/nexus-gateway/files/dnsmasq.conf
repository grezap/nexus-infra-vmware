# nexus-gateway — dnsmasq
# Serves DHCP on VMnet11 (.200-.250 — Packer scope only; production VMs are static).
# Serves authoritative DNS for *.nexus.local; forwards everything else.

# ─── Networking ──────────────────────────────────────────────────────────
# Bind to VMnet11 interface only — never serve DHCP/DNS on the bridged NIC.
interface=nic1
bind-interfaces
except-interface=nic0
no-dhcp-interface=nic0
no-dhcp-interface=nic2

# Listen on the backplane NIC for DNS only (handy for lab diagnostics).
interface=nic2

# ─── DHCP ────────────────────────────────────────────────────────────────
dhcp-range=192.168.70.200,192.168.70.250,255.255.255.0,30m
dhcp-option=option:router,192.168.70.1
dhcp-option=option:dns-server,192.168.70.1
dhcp-option=option:ntp-server,192.168.70.1
dhcp-option=option:domain-name,nexus.local
dhcp-authoritative

# Record lease file somewhere durable
dhcp-leasefile=/var/lib/misc/dnsmasq.leases

# ─── DNS ─────────────────────────────────────────────────────────────────
domain=nexus.local
local=/nexus.local/
expand-hosts
domain-needed
bogus-priv

# Upstream resolvers — public, privacy-respecting
no-resolv
server=1.1.1.1
server=1.0.0.1
server=9.9.9.9

# DNSSEC validation
dnssec
trust-anchor=.,20326,8,2,E06D44B80B8F1D39A95C0B0D7C65D08458E880409BBC683457104237C7F8EC8D
dnssec-check-unsigned

# Cache tuning — lab has high churn
cache-size=2048
min-cache-ttl=60

# Logging — send to journald (systemd captures it)
log-queries=extra
log-dhcp

# ─── Static hosts ────────────────────────────────────────────────────────
# Early-bring-up entries so cluster nodes resolve before AD DNS comes online.
# Superset lives in /etc/hosts.nexus — loaded via addn-hosts below. Placeholder
# list to be filled in by Phase 0.B.2+ as VMs come online.
addn-hosts=/etc/dnsmasq.d/hosts.nexus

# ─── Security ────────────────────────────────────────────────────────────
# Never forward reverse lookups of RFC1918 to upstream
bogus-priv
stop-dns-rebind
rebind-localhost-ok
