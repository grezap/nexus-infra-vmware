---
# ubuntu_base — role tasks
#
# Delivers the shared baseline for every non-gateway NexusPlatform Ubuntu VM.
# Mirrors debian_base line-for-line except for the three Ubuntu-specific bits
# flagged inline (unattended-upgrades origin, MOTD, cloud-init interaction).
#
#   - Persistent NIC naming (single NIC renamed to nic0 by OriginalName=en*)
#   - chrony client pointing at 192.168.70.1 (nexus-gateway as time source)
#   - nftables baseline (deny-in, allow SSH + node_exporter from VMnet11)
#   - prometheus-node-exporter on :9100 for Phase 0.I Prometheus scrapes
#   - Unattended security updates (Ubuntu:${distro}-security origin)
#   - Hardened sshd config
#   - Owner's SSH public key → nexusadmin's authorized_keys (if present)
#   - Template MOTD identifying the base image

- name: Ensure baseline packages are present
  ansible.builtin.apt:
    name:
      - nftables
      - chrony
      - prometheus-node-exporter
      - unattended-upgrades
      - apt-listchanges
      - curl
      - ca-certificates
      - gnupg
      - tcpdump
      - mtr-tiny
    state: present
    update_cache: true

# ─── Disable Ubuntu's default cloud-init network config ────────────────
# Ubuntu server ships with 50-cloud-init.yaml under /etc/netplan/. We bypass
# netplan entirely (systemd-networkd directly) so our .link + .network files
# take effect. Leaving netplan active would cause it to regenerate configs
# on boot and race with our systemd-networkd config.
- name: Disable cloud-init network config generation
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
    owner: root
    group: root
    mode: "0644"
    content: |
      network: {config: disabled}

- name: Remove netplan's cloud-init-generated config (conflicts with systemd-networkd)
  ansible.builtin.file:
    path: /etc/netplan/50-cloud-init.yaml
    state: absent

# ─── Persistent NIC naming ──────────────────────────────────────────────
# Every ubuntu24 clone gets exactly one NIC (VMnet11), attached by
# Terraform's modules/vm/ at clone time. MAC-agnostic rename — same template
# serves any caller regardless of MAC.
- name: Deploy systemd .link file (renames ens* → nic0)
  ansible.builtin.copy:
    dest: /etc/systemd/network/10-{{ ubuntu_base_nic_name }}.link
    owner: root
    group: root
    mode: "0644"
    content: |
      [Match]
      OriginalName=en*

      [Link]
      Name={{ ubuntu_base_nic_name }}

- name: Deploy systemd-networkd .network file (DHCP on the renamed NIC)
  ansible.builtin.copy:
    dest: /etc/systemd/network/20-{{ ubuntu_base_nic_name }}.network
    owner: root
    group: root
    mode: "0644"
    content: |
      [Match]
      Name={{ ubuntu_base_nic_name }}

      [Network]
      DHCP=yes

- name: Ensure systemd-networkd is enabled
  ansible.builtin.systemd:
    name: systemd-networkd
    enabled: true
    masked: false

# ─── nftables baseline ───────────────────────────────────────────────────
- name: Install nftables baseline ruleset (staged by Packer at /tmp/nftables.conf)
  ansible.builtin.copy:
    src: /tmp/nftables.conf
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Validate nftables ruleset
  ansible.builtin.command: nft -c -f /etc/nftables.conf
  changed_when: false

- name: Enable + start nftables
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

# ─── chrony client ───────────────────────────────────────────────────────
- name: Install chrony client config
  ansible.builtin.copy:
    src: /tmp/chrony.conf
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
    remote_src: true
  notify: Restart chrony

- name: Enable + start chrony
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started

# ─── node_exporter ───────────────────────────────────────────────────────
- name: Enable + start prometheus-node-exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    enabled: true
    state: started

# ─── Unattended security updates (Ubuntu-specific origin pattern) ────────
# deb13 uses `origin=Debian,label=Debian-Security`. Ubuntu's equivalent
# origin is `Ubuntu` with the `${distro_codename}-security` suite.
- name: Configure unattended-upgrades (security only)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50nexus-unattended
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::Automatic-Reboot "false";
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

# ─── Owner public key (optional) ─────────────────────────────────────────
# If packer/ubuntu24/ansible/roles/ubuntu_base/files/nexusadmin.pub exists
# at build time, deploy it so the owner can SSH in from day one. Absent
# file is not an error — Phase 0.D Vault SSH CA takes over later.
- name: Check for owner's SSH public key (optional)
  ansible.builtin.stat:
    path: "{{ role_path }}/files/nexusadmin.pub"
  register: ubuntu_base_nexusadmin_pub

- name: Ensure ~/.ssh exists for {{ target_user }}
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.ssh"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0700"
  when: ubuntu_base_nexusadmin_pub.stat.exists

- name: Install owner's public key into authorized_keys
  ansible.posix.authorized_key:
    user: "{{ target_user }}"
    key: "{{ lookup('ansible.builtin.file', role_path + '/files/nexusadmin.pub') }}"
    state: present
    exclusive: false
  when: ubuntu_base_nexusadmin_pub.stat.exists

# ─── SSH host-key regeneration on first boot ────────────────────────────
# Packer cleanup wipes /etc/ssh/ssh_host_* so every clone gets unique keys.
# Ubuntu 24.04's stock ssh.service is structurally identical to Debian 13's:
# an ExecStartPre=/usr/sbin/sshd -t that fails fatally without host keys.
# systemd drop-ins APPEND ExecStartPre entries (don't prepend), so we clear
# the inherited list with a bare `ExecStartPre=`, then re-declare in order:
# regen first (idempotent — no-op after boot 1), then the validation test.
# See docs/deb13.md → "SSH host keys" for the discovery story.
- name: Ensure ssh.service drop-in dir exists
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Drop-in — regenerate host keys before sshd -t
  ansible.builtin.copy:
    dest: /etc/systemd/system/ssh.service.d/10-regenerate-host-keys.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      # Clear inherited ExecStartPre list, then re-declare in order:
      ExecStartPre=
      ExecStartPre=-/usr/bin/ssh-keygen -A
      ExecStartPre=/usr/sbin/sshd -t

# ─── SSH hardening ───────────────────────────────────────────────────────
# Keep password auth enabled during Packer build so Packer can log in.
# Phase 0.D's post-Vault run swaps to key-only + disables password.
- name: Harden SSH (server-side minimums)
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config.d/10-nexus-hardening.conf
    create: true
    owner: root
    group: root
    mode: "0644"
    block: |
      PermitRootLogin no
      X11Forwarding no
      AllowAgentForwarding no
      MaxAuthTries 3
      LoginGraceTime 20
      ClientAliveInterval 60
      ClientAliveCountMax 3
  notify: Restart ssh

# ─── Banner ──────────────────────────────────────────────────────────────
- name: Install MOTD
  ansible.builtin.copy:
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"
    content: |
      ╔═══════════════════════════════════════════════════════════════╗
      ║  ubuntu24 — NexusPlatform generic Ubuntu 24.04 base template ║
      ║  Gateway: 192.168.70.1 (DNS/NTP/egress)                       ║
      ║  Services: nftables · chrony-client · node_exporter           ║
      ║  Built from nexus-infra-vmware/packer/ubuntu24                ║
      ║                                                                ║
      ║  This is a BASE IMAGE. A clone should have its own role       ║
      ║  overlay applied before considering it provisioned.           ║
      ╚═══════════════════════════════════════════════════════════════╝

# ─── Disable Ubuntu's default MOTD noise on SSH login ──────────────────
# Ubuntu pam_motd pulls from /etc/update-motd.d/* which includes landscape
# adverts, ESM nag screens, "X packages can be updated" — all noisy and
# non-declarative. Disable the dynamic MOTD generator; /etc/motd above
# is what clients see.
- name: Disable dynamic update-motd scripts
  ansible.builtin.file:
    path: "/etc/update-motd.d/{{ item }}"
    mode: "0644" # drop +x so pam_motd skips them
  loop:
    - 10-help-text
    - 50-motd-news
    - 85-fwupd
    - 88-esm-announce
    - 91-contract-ua-esm-status
    - 91-release-upgrade
    - 95-hwe-eol
    - 98-fsck-at-reboot
  failed_when: false # not all of these exist on every Ubuntu point release
