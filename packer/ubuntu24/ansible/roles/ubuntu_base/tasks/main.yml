---
# ubuntu_base — thin OS-specific tail
#
# Post-Phase 0.B.3 step 2 shape: everything generic lives under
# packer/_shared/ansible/roles/ (nexus_identity, nexus_network, nexus_firewall,
# nexus_observability). This role is now only what is genuinely Ubuntu-24.04
# specific:
#
#   - Baseline package install (distribution-shipped package names)
#   - cloud-init network config disable + /etc/netplan/50-cloud-init.yaml removal
#   - update-motd.d neutering (Landscape/ESM nag screens → chmod 0644)
#   - unattended-upgrades origin pattern (Ubuntu + ESM, not Debian's)
#   - MOTD banner identifying the base image

- name: Ensure baseline packages are present
  ansible.builtin.apt:
    name:
      - nftables
      - chrony
      - prometheus-node-exporter
      - unattended-upgrades
      - apt-listchanges
      - curl
      - ca-certificates
      - gnupg
      - tcpdump
      - mtr-tiny
    state: present
    update_cache: true

# ─── Disable Ubuntu's default cloud-init network config ────────────────
# Ubuntu server ships with 50-cloud-init.yaml under /etc/netplan/. We bypass
# netplan entirely (systemd-networkd directly via nexus_network) so our .link
# + .network files take effect. Leaving netplan active would cause it to
# regenerate configs on boot and race with our systemd-networkd config.
- name: Disable cloud-init network config generation
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
    owner: root
    group: root
    mode: "0644"
    content: |
      network: {config: disabled}

- name: Remove netplan's cloud-init-generated config (conflicts with systemd-networkd)
  ansible.builtin.file:
    path: /etc/netplan/50-cloud-init.yaml
    state: absent

# ─── Unattended security updates (Ubuntu origin pattern) ─────────────────
- name: Configure unattended-upgrades (security only)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50nexus-unattended
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::Automatic-Reboot "false";
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

# ─── Banner ──────────────────────────────────────────────────────────────
- name: Install MOTD
  ansible.builtin.copy:
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"
    content: |
      ╔═══════════════════════════════════════════════════════════════╗
      ║  ubuntu24 — NexusPlatform generic Ubuntu 24.04 base template ║
      ║  Gateway: 192.168.70.1 (DNS/NTP/egress)                       ║
      ║  Services: nftables · chrony-client · node_exporter           ║
      ║  Built from nexus-infra-vmware/packer/ubuntu24                ║
      ║                                                                ║
      ║  This is a BASE IMAGE. A clone should have its own role       ║
      ║  overlay applied before considering it provisioned.           ║
      ╚═══════════════════════════════════════════════════════════════╝

# ─── Disable Ubuntu's default MOTD noise on SSH login ──────────────────
# Ubuntu pam_motd pulls from /etc/update-motd.d/* which includes landscape
# adverts, ESM nag screens, "X packages can be updated" — all noisy and
# non-declarative. Disable the dynamic MOTD generator; /etc/motd above
# is what clients see.
- name: Disable dynamic update-motd scripts
  ansible.builtin.file:
    path: "/etc/update-motd.d/{{ item }}"
    mode: "0644" # drop +x so pam_motd skips them
  loop:
    - 10-help-text
    - 50-motd-news
    - 85-fwupd
    - 88-esm-announce
    - 91-contract-ua-esm-status
    - 91-release-upgrade
    - 95-hwe-eol
    - 98-fsck-at-reboot
  failed_when: false # not all of these exist on every Ubuntu point release
