# ansible.cfg — ubuntu24 template
#
# See packer/deb13/ansible/ansible.cfg for the full rationale. TL;DR:
# Packer's ansible-local resolves roles from its role_paths upload at
# build time, but ansible-lint in CI reads the source tree and needs
# to find the shared roles under packer/_shared/ansible/roles/.
[defaults]
roles_path = roles:../../_shared/ansible/roles
