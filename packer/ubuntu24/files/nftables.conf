#!/usr/sbin/nft -f
#
# ubuntu24 — nftables baseline ruleset
#
# Role: deny-all-inbound, allow management (SSH) + observability (node_exporter)
# from the lab network (VMnet11, 192.168.70.0/24). Outbound unrestricted.
#
# At clone time the single NIC is renamed to `nic0` by
# /etc/systemd/network/10-nic0.link (OriginalName=en* → Name=nic0).
#
# Role-specific VMs (e.g. Postgres, Vault) layer extra `accept` rules on top
# via /etc/nftables.d/ or by replacing this file entirely.
#
# Byte-identical to deb13/files/nftables.conf — a good signal the
# nftables baseline is a clean candidate for the _shared/ansible/roles/
# extraction planned in Phase 0.B.3 step 2.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        iif "lo" accept
        ct state { established, related } accept
        ct state invalid drop

        # ICMP — let everything ping (debug-friendly in a lab)
        ip protocol icmp   accept
        ip6 nexthdr icmpv6 accept

        # Management from the lab network only
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 22   accept comment "SSH from VMnet11"
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 9100 accept comment "node_exporter from VMnet11"

        counter drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
