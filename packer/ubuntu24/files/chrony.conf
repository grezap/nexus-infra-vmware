# ubuntu24 — chrony client config
# NexusPlatform time source: nexus-gateway (192.168.70.1) on VMnet11.
# Public pool is retained as fallback for cold-boot before the gateway is up
# (e.g. during `packer build` when this template has no route to 192.168.70.1
# — we're on NAT then, so the public pool serves us time; once instantiated
# by Terraform onto VMnet11, 192.168.70.1 is preferred).

server 192.168.70.1 iburst prefer
pool   ntp.ubuntu.com iburst

driftfile /var/lib/chrony/chrony.drift
ntsdumpdir /var/lib/chrony

# Step the clock if >1s off; only during the first 3 updates
makestep 1.0 3

# Sync RTC
rtcsync

# This box is a CLIENT only — do not serve NTP to anyone
deny all

logdir /var/log/chrony
