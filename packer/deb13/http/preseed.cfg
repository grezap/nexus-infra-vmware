# Debian 13 (Trixie) preseed — deb13 generic base template
# Non-interactive install. No GUI, no router packages. Ansible does the rest.

### Localisation
d-i debian-installer/locale            string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap  select us

### Network
d-i netcfg/choose_interface            select auto
d-i netcfg/get_hostname                string deb13
d-i netcfg/get_domain                  string nexus.local
d-i netcfg/wireless_wep                string

### Mirror
d-i mirror/country                     string manual
d-i mirror/http/hostname               string deb.debian.org
d-i mirror/http/directory              string /debian
d-i mirror/http/proxy                  string

### Account setup — root disabled; sudo user created
d-i passwd/root-login                  boolean false
d-i passwd/make-user                   boolean true
d-i passwd/user-fullname               string NexusPlatform Admin
d-i passwd/username                    string nexusadmin
d-i passwd/user-password               password nexus-packer-build-only
d-i passwd/user-password-again         password nexus-packer-build-only
d-i user-setup/allow-password-weak     boolean true
d-i user-setup/encrypt-home            boolean false

### Clock and time zone
d-i clock-setup/utc                    boolean true
d-i time/zone                          string UTC
d-i clock-setup/ntp                    boolean true

### Partitioning — atomic, whole disk, ext4, swap enabled (generic workload template)
d-i partman-auto/method                string regular
d-i partman-auto/choose_recipe         select atomic
d-i partman-auto/disk                  string /dev/sda
d-i partman/default_filesystem         string ext4
d-i partman-partitioning/confirm_write_new_label  boolean true
d-i partman/choose_partition           select finish
d-i partman/confirm                    boolean true
d-i partman/confirm_nooverwrite        boolean true
d-i partman-basicfilesystems/no_swap   boolean false

### Base + packages — NO dnsmasq, NO router extras; Ansible installs the rest.
d-i base-installer/install-recommends  boolean false
tasksel tasksel/first                  multiselect standard, ssh-server
d-i pkgsel/include                     string openssh-server sudo curl ca-certificates gnupg nftables chrony prometheus-node-exporter python3 python3-apt
d-i pkgsel/upgrade                     select safe-upgrade
popularity-contest popularity-contest/participate  boolean false

### Boot loader
d-i grub-installer/only_debian         boolean true
d-i grub-installer/with_other_os       boolean false
d-i grub-installer/bootdev             string /dev/sda

### Enable passwordless sudo for the build user — locked down by Ansible later
d-i preseed/late_command               string \
    in-target sh -c 'echo "nexusadmin ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/nexusadmin'; \
    in-target chmod 0440 /etc/sudoers.d/nexusadmin; \
    in-target systemctl enable ssh; \
    in-target systemctl enable nftables; \
    in-target systemctl enable chrony; \
    in-target systemctl enable prometheus-node-exporter

### Finish install — no confirmation prompt
d-i finish-install/reboot_in_progress  note
