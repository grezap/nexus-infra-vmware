---
# debian_base — thin OS-specific tail
#
# Post-Phase 0.B.3 step 2 shape: everything generic lives under
# packer/_shared/ansible/roles/ (nexus_identity, nexus_network, nexus_firewall,
# nexus_observability). This role is now only what is genuinely Debian-13
# specific:
#
#   - Baseline package install (distribution-shipped package names)
#   - unattended-upgrades origin pattern (Debian-Security, not Ubuntu's)
#   - MOTD banner identifying the base image
#
# The calling playbook runs the shared roles first, then this one.

- name: Ensure baseline packages are present
  ansible.builtin.apt:
    name:
      - nftables
      - chrony
      - prometheus-node-exporter
      - unattended-upgrades
      - apt-listchanges
      - curl
      - ca-certificates
      - gnupg
      - tcpdump
      - mtr-tiny
    state: present
    update_cache: true

# ─── Unattended security updates (Debian origin pattern) ─────────────────
# Debian uses `origin=Debian,label=Debian-Security` keyed by codename.
# (Contrast with Ubuntu's `${distro_id}:${distro_codename}-security` +
# ESM variants — see ubuntu_base.)
- name: Configure unattended-upgrades (security only)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50nexus-unattended
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Origins-Pattern {
          "origin=Debian,codename=${distro_codename},label=Debian-Security";
      };
      Unattended-Upgrade::Automatic-Reboot "false";
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

# ─── Banner ──────────────────────────────────────────────────────────────
- name: Install MOTD
  ansible.builtin.copy:
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"
    content: |
      ╔═══════════════════════════════════════════════════════════════╗
      ║  deb13 — NexusPlatform generic Debian 13 base template        ║
      ║  Gateway: 192.168.70.1 (DNS/NTP/egress)                       ║
      ║  Services: nftables · chrony-client · node_exporter           ║
      ║  Built from nexus-infra-vmware/packer/deb13                   ║
      ║                                                                ║
      ║  This is a BASE IMAGE. A clone should have its own role       ║
      ║  overlay applied before considering it provisioned.           ║
      ╚═══════════════════════════════════════════════════════════════╝
