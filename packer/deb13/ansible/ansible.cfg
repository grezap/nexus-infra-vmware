# ansible.cfg — deb13 template
#
# At Packer build time, ansible-local uploads every role listed in
# role_paths into a single directory on the target, so role references
# resolve by name without any search-path tweaks. At lint time (CI
# runs `ansible-lint packer/deb13/ansible/`) we aren't inside Packer,
# so the shared roles under ../../_shared/ansible/roles/ need to be
# on the search path explicitly. Anything else running ansible
# against this tree (rare — Packer is the only intended caller)
# benefits from the same resolution.
[defaults]
roles_path = roles:../../_shared/ansible/roles
